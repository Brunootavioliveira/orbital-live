spring:
  application:
    name: orbital-live
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

nasa:
  horizons:
    url: ${NASA_HORIZONS_URL}
  scheduler:
    interval: ${NASA_SCHEDULER_INTERVAL:30000}

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html